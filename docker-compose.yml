services:
  haproxy:
    build:
      context: .
      args:
        HAPROXY_IMAGE: haproxy:${HAPROXY_VERSION:-3.3.10}
    image: ${IMAGE_NAME:-haproxy-logrotate}:${HAPROXY_VERSION:-3.3.10}
    container_name: haproxy-postgresql
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Seoul}
      HAPROXY_MAXCONN: ${HAPROXY_MAXCONN:-4096}
      HAPROXY_WRITE_PORT: ${HAPROXY_WRITE_PORT:-5432}
      HAPROXY_READ_PORT: ${HAPROXY_READ_PORT:-5433}
      HAPROXY_STATS_PORT: ${HAPROXY_STATS_PORT:-8404}
      POSTGRES_MASTER_HOST: ${POSTGRES_MASTER_HOST:-postgres-master}
      POSTGRES_MASTER_PORT: ${POSTGRES_MASTER_PORT:-5432}
      POSTGRES_REPLICA_HOST: ${POSTGRES_REPLICA_HOST:-postgres-replica}
      POSTGRES_REPLICA_PORT: ${POSTGRES_REPLICA_PORT:-5432}
    ports:
      - "${HAPROXY_WRITE_PORT:-5432}:${HAPROXY_WRITE_PORT:-5432}"
      - "${HAPROXY_READ_PORT:-5433}:${HAPROXY_READ_PORT:-5433}"
      - "${HAPROXY_STATS_PORT:-8404}:${HAPROXY_STATS_PORT:-8404}"
    volumes:
      - haproxy-logs:/var/log/haproxy
    healthcheck:
      test: ["CMD-SHELL", "haproxy -c -q -f /usr/local/etc/haproxy/haproxy.cfg"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  haproxy-logs:
